﻿<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Verb Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --panel: #1e1e1e;
    --panel2: #1e1e1e;
    --text: #ffffff;
    --muted: #c2c2c2;
    --border: #3b3b3b00;
    --accent: #8a2be2;
    --accent2: #a78bfa;
    --good: #34d399;
    --warn: #fbbf24;
    --header-offset: 2px;
    --header-bg: #000000;
    --header-border: #00000000;
    --title-color: #ffffff;
    --seam-pad: 12px;
    --card-bg: #1e1e1e;
    --card-shadow: 0 10px 28px rgba(0,0,0,0.25);
    --table-header: #636363;
    --subhead: #d6d6d6;
    --selected-bg: #1e1e1e;
    --selected-border: #383838;
    --row-line: rgba(255,255,255,0.03);
    --input-bg: #161616;
    --input-border: rgb(255 255 255 / 0%);
    --hover-bg: rgba(255,255,255,0.05);
    --hover-border: rgb(255 255 255 / 0%);
    --detail-head-bg: #1e1e1e;
    --tense-bg: #2b2b2b;
    --tense-border: #3b3b3b00;
    --type-pill-bg: #383838;
    --type-pill-border: #54545400;
    --type-pill-text: #4682b4;
    --pill-border: rgb(255 255 255 / 14%);
    --chip-bg: #2b2b2b;
    --chip-border: rgb(255 255 255 / 0%);
    --table-rule: #d4d4d4;
    --big-color: #ff00ff;
    --section-color: #ff69b4;
    --note-subhead-size: 13.5px;
    --note-subhead-weight: 700;
    --note-subhead-color: #ffffff;
    --item-border: #42424200;
    --hint-bg: #121212;
    --hint-border: #0f0f0f00;
    --popover-bg: #2a2a2a;
    --popover-border: rgb(255 255 255 / 0%);
    --popover-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    --close-bg: rgba(255, 255, 255, 0.06);
    --close-border: rgb(255 255 255 / 0%);
    --form-hover-bg: rgba(255, 255, 255, 0.05);
    --form-hover-text: #ffd700;
    --pick-bg: rgba(255, 255, 0, 0.3);
  }
  * { box-sizing: border-box; }
  html,
  body {
    margin: 0;
    padding: 0;
  }
  body {
    padding-top: var(--header-offset);
    overflow-x: hidden;
    font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
    font-size: 10px;
    background: var(--bg);
    color: var(--text);
  }
  .headerHotspot {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 14px;
    z-index: 11;
  }
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 4px 6px;
    border-bottom: 1px solid var(--header-border);
    background: var(--header-bg);
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: translateY(calc(-100% - 2px));
    transition: transform 160ms ease, opacity 160ms ease;
  }
  .headerHotspot:hover + header,
  header:hover,
  header:focus-within {
    opacity: 1;
    transform: translateY(0);
  }
  .wrap {
    width: fit-content;
    max-width: none;
    margin: 0 auto;
    padding: 0 6px;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.2px;
    color: var(--title-color);
  }
  .row {
    display: grid;
    width: fit-content;
    grid-template-columns: 290px max-content minmax(0, 425px);
    align-items: start;
    gap: 10px;
    padding: 2px 6px 10px;
  }
  .listCard {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .card {
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card-bg);
    box-shadow: var(--card-shadow);
  }
  main.card {
    width: fit-content;
    justify-self: start;
  }
  .helperCard {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .tenseHelper {
    display: grid;
    align-content: start;
    gap: 8px;
    min-height: 0;
    overflow: auto;
    padding: 8px 10px;
  }
  .tenseHelper::-webkit-scrollbar {
    width: 12px;
    height: 12px;
  }
  .tenseHelper::-webkit-scrollbar-track {
    background: #2b2b2b;
  }
  .tenseHelper::-webkit-scrollbar-thumb {
    border: 2px solid #2b2b2b;
    border-radius: 999px;
    background: #1f1f1f;
  }
  .tenseHelper::-webkit-scrollbar-thumb:hover {
    background: #161616;
  }
  .helperEyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--table-header);
  }
  .helperTopRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .helperTitle {
    font-size: 18px;
    line-height: 1.15;
    font-weight: 800;
    color: var(--section-color);
  }
  .helperMeta {
    font-size: 13px;
    line-height: 1.2;
    color: var(--subhead);
  }
  .helperPanel {
    padding: 7px 8px;
    border: 1px solid var(--tense-border);
    border-radius: 12px;
    background: var(--tense-bg);
  }
  .helperSectionTitle {
    margin: 0 0 5px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--note-subhead-color);
  }
  .helperList {
    margin: 0;
    padding-left: 16px;
    font-size: 14px;
    line-height: 1.25;
    color: var(--muted);
  }
  .helperList li + li {
    margin-top: 5px;
  }
  .helperFormula {
    font-size: 14px;
    line-height: 1.25;
    color: var(--text);
    white-space: pre-wrap;
  }
  .helperCue {
    font-size: 14px;
    line-height: 1.25;
    color: var(--muted);
  }
  .helperSource {
    font-size: 11px;
    line-height: 1.2;
    color: var(--table-header);
  }
  .pad { padding: 8px; }
  .search {
    display: grid;
    gap: 6px;
    padding: 5px 7px;
  }
  .filterRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    position: relative;
    z-index: 5;
  }
  .filterSelect {
    width: 100%;
    padding: 4px 8px;
    border: 1px solid var(--input-border);
    border-radius: 10px;
    outline: none;
    background: var(--input-bg);
    color: var(--text);
    font-size: 12px;
    line-height: 1.2;
  }
  .filterSelect option {
    background: #1e1e1e;
    color: var(--text);
  }
  .filterDropdown {
    position: relative;
    min-width: 0;
  }
  .filterDropdownBtn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    padding: 4px 8px;
    border: 1px solid var(--input-border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    font-size: 12px;
    line-height: 1.2;
    cursor: pointer;
    text-align: left;
  }
  .filterDropdownBtn:hover {
    background: var(--hover-bg);
    border-color: var(--hover-border);
  }
  .filterDropdownBtn:focus-visible {
    outline: 1px solid var(--selected-border);
    outline-offset: 1px;
  }
  .filterDropdownBtn[aria-expanded="true"] {
    border-color: var(--selected-border);
    box-shadow: inset 0 0 0 1px rgb(255 255 255 / 5%);
  }
  .filterDropdownText {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filterDropdownCaret {
    flex: 0 0 auto;
    font-size: 10px;
    color: var(--subhead);
    transition: transform 120ms ease;
  }
  .filterDropdownBtn[aria-expanded="true"] .filterDropdownCaret {
    transform: rotate(180deg);
  }
  .filterDropdownMenu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    display: none;
    max-height: 220px;
    overflow: auto;
    padding: 4px;
    border: 1px solid var(--input-border);
    border-radius: 10px;
    background: #1f1f1f;
    box-shadow: 0 12px 24px rgb(0 0 0 / 38%);
    z-index: 20;
  }
  .filterDropdownMenu.open {
    display: grid;
    gap: 3px;
  }
  .filterDropdownMenu::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  .filterDropdownMenu::-webkit-scrollbar-track {
    background: #2b2b2b;
  }
  .filterDropdownMenu::-webkit-scrollbar-thumb {
    border: 1px solid #2b2b2b;
    border-radius: 999px;
    background: #1f1f1f;
  }
  .filterDropdownMenu::-webkit-scrollbar-thumb:hover {
    background: #161616;
  }
  .filterDropdownOption {
    width: 100%;
    padding: 5px 7px;
    border: 1px solid transparent;
    border-radius: 7px;
    background: #2b2b2b;
    color: var(--text);
    font-size: 12px;
    line-height: 1.2;
    text-align: left;
    cursor: pointer;
  }
  .filterDropdownOption:hover {
    background: var(--hover-bg);
    border-color: var(--hover-border);
  }
  .filterDropdownOption:focus-visible {
    outline: 1px solid var(--selected-border);
    outline-offset: 1px;
  }
  .filterDropdownOption.is-active {
    background: var(--selected-bg);
    border-color: var(--selected-border);
    color: var(--big-color);
  }
  .filterSelectNative {
    position: absolute;
    inset: 0;
    width: 0;
    height: 0;
    opacity: 0;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--input-border);
    border-radius: 10px;
    outline: none;
    background: var(--input-bg);
    color: var(--text);
  }
  input[type="search"]::placeholder {
    color: rgba(233,238,252,0.55);
  }
  .list {
    display: grid;
    align-content: start;
    gap: 3px;
    flex: 1 1 auto;
    min-height: 0;
    max-height: none;
    overflow: auto;
    padding: 4px;
    scroll-padding-top: 4px;
    scroll-snap-type: y proximity;
    scrollbar-width: thin;
    scrollbar-color: #1f1f1f #2b2b2b;
  }
  .list::-webkit-scrollbar {
    width: 14px;
    height: 14px;
  }
  .list::-webkit-scrollbar-track {
    background: #2b2b2b;
  }
  .list::-webkit-scrollbar-thumb {
    border: 2px solid #2b2b2b;
    border-radius: 999px;
    background: #1f1f1f;
  }
  .list::-webkit-scrollbar-thumb:hover {
    background: #161616;
  }
  .list::-webkit-scrollbar-button {
    background: #1f1f1f;
  }
  .list::-webkit-scrollbar-button:hover {
    background: #161616;
  }
  .verbBtn {
    display: block;
    width: 100%;
    padding: 6px 7px;
    border: 1px solid var(--item-border);
    border-radius: 10px;
    background: #2b2b2b;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    scroll-snap-align: start;
    scroll-snap-stop: always;
  }
  .verbBtn:hover {
    background: var(--hover-bg);
    border-color: var(--hover-border);
  }
  .verbBtn[aria-selected="true"] {
    background: var(--selected-bg);
    border-color: var(--selected-border);
  }
  .verbBtn[aria-selected="true"] .verbTitle,
  .verbBtn[aria-selected="true"] .pill:not(.typePill) {
    color: var(--big-color);
  }
  .verbTop {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .verbTitle {
    overflow: hidden;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .verbMeta {
    margin-top: 1px;
    font-size: 12px;
    color: var(--muted);
  }
  .tagRow {
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .tagRow .pill {
    max-width: 100%;
    font-size: 11px;
    line-height: 1.15;
    text-align: right;
    white-space: normal;
  }
  .tagPill {
    font-size: 11px;
    padding: 3px 7px;
  }
  .verbBtn .pill {
    font-size: 11.75px;
  }
  .tagCore {
    color: #b3b3b3;
  }
  .tagCustom {
    color: #ffe08a;
  }
  .tagSlang {
    color: #85f4fb;
  }
  .tagExplicit {
    color: #ff8c00;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 8px;
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    font-size: 11px;
    line-height: 1;
    vertical-align: middle;
    color: #ffffff;
  }
  .big .pill {
    color: var(--big-color);
    font-weight: 700;
  }
  .typePill {
    background: var(--type-pill-bg);
    border-color: var(--type-pill-border);
    color: var(--type-pill-text);
  }
  .detailHead {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 7px 9px;
    border-bottom: 1px solid var(--table-rule);
    background: var(--detail-head-bg);
  }
  .detailHead .left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .big {
    color: var(--big-color);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.3px;
  }
  .meaning {
    font-size: 16px;
    color: var(--muted);
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .chip {
    padding: 3px 7px;
    border: 1px solid var(--chip-border);
    border-radius: 999px;
    background: var(--chip-bg);
    font-size: 15px;
    color: var(--text);
  }
  .chip strong {
    font-weight: 800;
    color: var(--accent);
  }
  .chipFormBtn {
    margin-left: 4px;
  }
  .panel {
    padding: 5px 7px 7px;
  }
  .twoCol {
    display: grid;
    grid-template-columns: max-content max-content;
    gap: var(--sideGap);
    align-items: start;
  }
  .colHeader {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin: 1px 0 4px;
    padding: 0 2px;
  }
  .colHeader .h {
    font-size: 16.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--section-color);
  }
  .tense {
    overflow: visible;
    margin: 3px 0;
    border: 1px solid var(--tense-border);
    border-radius: 12px;
    background: var(--tense-bg);
  }
  .tense--spaced {
    margin-top: 10px;
  }
  .tense summary {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 2px 6px;
    list-style: none;
    cursor: default;
  }
  .tense summary::-webkit-details-marker { display: none; }
  .tenseHead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
  }
  .tenseTitleBtn {
    display: inline-block;
    padding: 0;
    border: 0;
    background: transparent;
    font: inherit;
    color: inherit;
    line-height: inherit;
    text-align: left;
    cursor: pointer;
  }
  .tenseTitleBtn:focus-visible {
    outline: 1px solid var(--selected-border);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .tenseCollapseBtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    padding: 0;
    border: 1px solid var(--input-border);
    border-radius: 999px;
    background: var(--hover-bg);
    color: #ffffff;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    opacity: 0.8;
  }
  .tenseCollapseBtn:hover {
    border-color: var(--selected-border);
    background: var(--input-bg);
    opacity: 1;
  }
  .tenseCollapseBtn:focus-visible {
    outline: 1px solid var(--selected-border);
    outline-offset: 1px;
  }
  .tenseTitle {
    font-size: 16.5px;
    font-weight: 600;
    line-height: 1.15;
    color: var(--accent);
  }
  .activeTenseHighlight {
    display: inline;
    padding: 0;
    border-radius: 0;
    background: transparent;
    color: #ffd700;
    box-shadow: none;
  }
  .tenseSub {
    font-size: 11px;
    color: var(--muted);
  }
  table {
    display: inline-table;
    width: fit-content;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .tense table {
    margin: 0;
  }
  th,
  td {
    padding: 2px 6px;
    border-top: 0;
    font-size: 17px;
    line-height: 1.0;
    white-space: nowrap;
  }
  th {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--table-header);
  }
  thead th {
    padding-top: 2px;
    padding-bottom: 2px;
    font-size: 13px;
  }
  thead .thgroup {
    font-weight: 950;
    text-align: left;
    color: var(--subhead);
  }
  td:nth-child(1),
  td:nth-child(3) {
    color: var(--muted);
  }
  td:nth-child(2),
  td:nth-child(4) {
    padding-left: 8px;
    text-align: left;
  }
  td:nth-child(4) {
    padding-left: 10px;
  }
  thead .thgroup:nth-child(2) {
    padding-left: 6px;
  }
  td { overflow: visible; }
  .formBtn {
    display: block;
    width: 100%;
    min-width: 1ch;
    padding: 0;
    border: 0;
    background: transparent;
    font-family: inherit;
    font-size: 17px;
    font-weight: 700;
    font-style: normal;
    letter-spacing: inherit;
    color: var(--text);
    cursor: pointer;
    line-height: 1;
    white-space: nowrap;
    text-align: left;
  }
  .formBtn:hover {
    border-radius: 6px;
    background: var(--form-hover-bg);
    color: var(--form-hover-text);
  }
  .formBtn.checkCorrect {
    color: var(--good);
  }
  .formBtn.checkWarn {
    color: #ff8c00;
  }
  .formBtn.checkBad {
    color: var(--accent);
  }
  .formBtn.draftEdited {
    color: #ff4500;
  }
  .chip .chipFormBtn {
    display: inline-flex;
    align-items: baseline;
    width: auto;
    min-width: 0;
    padding: 0;
    border: 0;
    background: transparent;
    font-size: inherit;
    font-weight: 500;
    line-height: 1;
    vertical-align: baseline;
    white-space: nowrap;
    text-align: left;
  }
  .chip .chipGerundBtn {
    min-width: var(--gerundMinW, 0px);
  }
  .chip .chipPartBtn {
    min-width: var(--partMinW, 0px);
  }
  .inlineCellEditor {
    width: 100%;
    min-width: 56px;
    padding: 0;
    border: 0;
    outline: none;
    background: transparent;
    color: #ff4500;
    font: inherit;
    font-weight: 700;
    line-height: inherit;
    text-align: left;
  }
  .mutedBlock {
    font-size: 17px;
    line-height: 1.5;
    color: var(--muted);
    white-space: pre-wrap;
  }
  .stackGapSm { height: 8px; }
  .stackGapMd { height: 10px; }
  .sectionLabel {
    margin-bottom: 6px;
    font-size: var(--note-subhead-size);
    font-weight: var(--note-subhead-weight);
    color: var(--note-subhead-color);
  }
  .imperativeBoard {
    display: contents;
  }
  .imperativeHalf {
    display: grid;
    align-items: baseline;
    row-gap: 6px;
  }
  .imperativeHalf--left {
    grid-column: 1;
    grid-template-columns: var(--p1W) max-content;
    justify-self: end;
    column-gap: 18px;
    padding-right: var(--seam-pad);
  }
  .imperativeHalf--right {
    grid-column: 3;
    grid-template-columns: var(--p2W) max-content;
    justify-self: start;
    column-gap: 18px;
    padding-left: var(--seam-pad);
  }
  .imperativeLabel {
    font-size: 17px;
    line-height: 1;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
    text-align: left;
  }
  .imperativeForm {
    font-size: 17px;
    line-height: 1;
    font-weight: 700;
    font-style: normal;
    color: var(--text);
    white-space: nowrap;
    text-align: left;
  }
  .imperativeFormBtn:hover {
    border-radius: 0;
    background: transparent;
    color: inherit;
  }
  .imperativeFormBtn {
    display: inline;
    width: auto;
    vertical-align: baseline;
  }
  .notesList {
    display: grid;
    gap: 8px;

<script src="verbs-data.js"></script>
<script type="text/plain" id="legacy-inline-script">
const DATA = window.VERB_DATA || [];

function splitSynAntLine(line) {
  const synMatch = line.match(/(?:^|\s)Syn\.\:\s*(.*?)(?=\s+Ant\.\:|$)/i);
  const antMatch = line.match(/(?:^|\s)Ant\.\:\s*(.*)$/i);
  return {
    syn: synMatch ? synMatch[1].split(/\s*;\s*/).map(x => x.trim()).filter(Boolean) : [],
    ant: antMatch ? antMatch[1].split(/\s*;\s*/).map(x => x.trim()).filter(Boolean) : []
  };
}

function cleanText(input) {
  let out = (input || "").replace(/\u00ad/g, "").replace(/\s+/g, " ").trim();
  if (!out) return "";

  const replacements = [
    ["â€™", "’"], ["â€˜", "‘"], ["â€œ", "“"], ["â€", "”"],
    ["â€“", "–"], ["â€”", "—"], ["â€¦", "…"], ["â€¢", "•"],
    ["Â¿", "¿"], ["Â¡", "¡"], ["Â«", "«"], ["Â»", "»"],
    ["Ã¡", "á"], ["Ã©", "é"], ["Ã­", "í"], ["Ã³", "ó"], ["Ãº", "ú"],
    ["Ã", "Á"], ["Ã‰", "É"], ["Ã", "Í"], ["Ã“", "Ó"], ["Ãš", "Ú"],
    ["Ã±", "ñ"], ["Ã‘", "Ñ"], ["Ã¼", "ü"], ["Ãœ", "Ü"], ["Â", ""]
  ];
  replacements.forEach(([bad, good]) => {
    out = out.split(bad).join(good);
  });

  return out
    .replace(/\s+([,.;:!?])/g, "$1")
    .replace(/([¿¡])\s+/g, "$1")
    .trim();
}

function isLikelyEditorialNote(line) {
  const t = normalize(line || "");
  return (
    /^an essential\b/.test(t) ||
    /^can'?t (find|remember)\b/.test(t) ||
    /^\d+\s+verb\b/.test(t) ||
    /^sentences using\b/.test(t) ||
    /^words and expressions related to (this|these) verb/.test(t) ||
    /^proverb(s)?\b/.test(t) ||
    /^[a-z]+(?:\/[a-z]+)?$/.test(t)
  );
}

function extractInlineSynAnt(line) {
  const text = cleanText(line);
  const markers = [...text.matchAll(/\b(Syn|Ant)\.\:\s*/gi)];
  if (!markers.length) {
    return { rest: text, syn: [], ant: [] };
  }

  const syn = [];
  const ant = [];
  const rest = cleanText(text.slice(0, markers[0].index));

  markers.forEach((m, idx) => {
    const label = (m[1] || "").toLowerCase();
    const start = (m.index ?? 0) + m[0].length;
    const end = idx + 1 < markers.length ? (markers[idx + 1].index ?? text.length) : text.length;
    const segment = cleanText(text.slice(start, end).replace(/^[-–—:;\s]+/, ""));
    if (!segment) return;
    const parts = segment.split(/\s*;\s*/).map(cleanText).filter(Boolean);
    if (label === "syn") syn.push(...parts);
    if (label === "ant") ant.push(...parts);
  });

  return { rest, syn, ant };
}

function splitReadableNoteLine(line) {
  const cleaned = cleanText(line);
  if (!cleaned) return [];

  const rows = [];
  const push = (text) => {
    const t = cleanText(text);
    if (t) rows.push(t);
  };

  cleaned.split(/\t+/).forEach(part => {
    const p = cleanText(part);
    if (!p) return;

    if (p.includes(";")) {
      p.split(/\s*;\s*/).forEach(push);
      return;
    }

    if (p.includes(" / ") && p.length > 90) {
      p.split(/\s+\/\s+/).forEach(push);
      return;
    }

    if (p.length > 120) {
      const sentenceParts = p.split(/(?<=[.!?])\s+(?=[A-ZÁÉÍÓÚÑ¿¡])/);
      if (sentenceParts.length > 1) {
        sentenceParts.forEach(push);
        return;
      }
    }

    push(p);
  });

  return rows;
}

function dedupeTextRows(rows) {
  const out = [];
  const seen = new Set();
  (rows || []).forEach(row => {
    const value = cleanText(row);
    const key = normalize(value);
    if (!value || seen.has(key)) return;
    seen.add(key);
    out.push(value);
  });
  return out;
}

function parseImperativeLines(lines) {
  const cleaned = (lines || []).map(line => (line || "").trim()).filter(Boolean);
  const pairParts = cleaned[1]
    ? cleaned[1].split(/\s+(?=[^\s;]+;\s*no\s+)/).map(part => part.trim()).filter(Boolean)
    : [];
  const lowerMatch = cleaned[2] ? cleaned[2].match(/^(.*\S)\s+(\S+)$/) : null;

  return {
    nosotros: cleaned[0] ? cleaned[0].replace(/^[-—]\s*/, "").trim() : "",
    tu: pairParts[0] || "",
    vosotros: pairParts[1] || "",
    usted: lowerMatch ? lowerMatch[1].trim() : (cleaned[2] || ""),
    ustedes: lowerMatch ? lowerMatch[2].trim() : ""
  };
}

function normalizeVerbRecord(v) {
  v.infinitive = cleanText(v.infinitive);
  v.meaning_en = cleanText(v.meaning_en);
  v.gerund = cleanText(v.gerund);
  v.past_participle = cleanText(v.past_participle);
  v.pattern_notes = dedupeTextRows((v.pattern_notes || []).flatMap(splitReadableNoteLine));

  const rawImperative = (v.imperative || [])
    .map(line => cleanText(line))
    .filter(Boolean);
  const imperativeLines = rawImperative.slice(0, 3);
  const extras = {
    syn: [...(v.extras?.syn || [])].map(cleanText).filter(Boolean),
    ant: [...(v.extras?.ant || [])].map(cleanText).filter(Boolean),
    related: [...(v.extras?.related || [])].map(cleanText).filter(Boolean)
  };

  rawImperative.slice(3).forEach(line => {
    if (/(?:^|\s)(?:Syn|Ant)\.\:/i.test(line)) {
      const parsed = splitSynAntLine(line);
      extras.syn.push(...parsed.syn.map(cleanText));
      extras.ant.push(...parsed.ant.map(cleanText));
      return;
    }
    extras.related.push(line);
  });

  const related = [];
  const syn = [...extras.syn];
  const ant = [...extras.ant];

  extras.related.forEach(line => {
    const extracted = extractInlineSynAnt(line);
    if (extracted.syn.length) syn.push(...extracted.syn);
    if (extracted.ant.length) ant.push(...extracted.ant);
    if (extracted.rest && !isLikelyEditorialNote(extracted.rest)) {
      related.push(...splitReadableNoteLine(extracted.rest));
    }
  });

  v.extras = {
    related: dedupeTextRows(related),
    syn: dedupeTextRows(syn.flatMap(splitReadableNoteLine)),
    ant: dedupeTextRows(ant.flatMap(splitReadableNoteLine))
  };
  v.imperative_raw = rawImperative;
  v.imperative = imperativeLines;
  v.imperativeParsed = parseImperativeLines(imperativeLines);

  Object.entries(v.simple || {}).forEach(([tenseKey, tenseTable]) => {
    ["singular", "plural"].forEach(numKey => {
      tenseTable[numKey] = (tenseTable[numKey] || []).map(cleanText);
    });
    const cleanKey = cleanText(tenseKey);
    if (cleanKey !== tenseKey) {
      v.simple[cleanKey] = tenseTable;
      delete v.simple[tenseKey];
    }
  });

  Object.entries(v.compound || {}).forEach(([tenseKey, tenseTable]) => {
    ["singular", "plural"].forEach(numKey => {
      tenseTable[numKey] = (tenseTable[numKey] || []).map(cleanText);
    });
    const cleanKey = cleanText(tenseKey);
    if (cleanKey !== tenseKey) {
      v.compound[cleanKey] = tenseTable;
      delete v.compound[tenseKey];
    }
  });

  return v;
}

DATA.forEach(normalizeVerbRecord);

const PRONOUNS = {
  "1-sg": "yo",
  "2-sg": "tú",
  "3-sg": "él",
  "1-pl": "nosotros",
  "2-pl": "vosotros",
  "3-pl": "ellos",
};

const TENSE_HINTS = {
  "1": "Used for <strong>now</strong> and general truths (present).",
  "2": "Used for <strong>ongoing/habitual past</strong> or descriptions (imperfect).",
  "3": "Used for <strong>completed past actions</strong> (preterite).",
  "4": "Used for <strong>future</strong> statements and predictions.",
  "5": "Often used for <strong>would</strong> / hypothetical situations (conditional).",
  "6": "Used for <strong>present subjunctive</strong>: doubt, desire, recommendations.",
  "7": "Used for <strong>imperfect subjunctive</strong>: past hypotheticals, reported speech.",
  "8": "Present perfect: <strong>have + past participle</strong> (recent/connected past).",
  "9": "Past perfect: <strong>had + past participle</strong> (earlier past).",
  "10": "Preterite anterior: rare/literary; <strong>had (immediately) done</strong>.",
  "11": "Future perfect: <strong>will have + past participle</strong>.",
  "12": "Conditional perfect: <strong>would have + past participle</strong>.",
  "13": "Perfect subjunctive: <strong>have + past participle</strong> in subjunctive contexts.",
  "14": "Pluperfect subjunctive: <strong>had + past participle</strong> in subjunctive contexts."
};

function normalize(s) {
  return (s || "").toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu, "");
}

function renderList(filterText="") {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const q = normalize(filterText);
  const items = DATA.filter(v => {
    const hay = normalize(v.infinitive + " " + v.meaning_en);
    return hay.includes(q);
  });

  items.forEach(v => {
    const btn = document.createElement("button");
    btn.className = "verbBtn";
    btn.type = "button";
    btn.dataset.id = v.id;

    btn.innerHTML = `
      <div class="verbTop">
        <div class="verbTitle"><span class="pill">#${String(v.id).padStart(4,"0")}</span> ${v.infinitive}</div>
      </div>
      <div class="verbMeta">${v.meaning_en || ""}</div>
      <div class="tagRow">
        <div class="pill typePill">${(v.pattern_notes && v.pattern_notes[0]) ? v.pattern_notes[0].replace("verb","").trim() : ""}</div>
      </div>
    `;

    btn.addEventListener("click", () => {
      document.querySelectorAll(".verbBtn").forEach(b => b.setAttribute("aria-selected","false"));
      btn.setAttribute("aria-selected","true");
      renderDetail(v.id);
      hidePopover();
    });

    list.appendChild(btn);
  });

  // Auto-select first
  const first = list.querySelector(".verbBtn");
  if (first && !document.querySelector(".verbBtn[aria-selected='true']")) {
    first.click();
  }
}

function tenseBlocks(obj, verb, sectionLabel) {
  const keys = Object.keys(obj || {});

  return keys.map((k, idx) => {
    const table = obj[k];
    const num = (k.match(/^\d+/) || [""])[0];
    const label = k.replace(/^\d+\s*/, "");
    const rows = [
      ["1", "Singular", table.singular?.[0], "Plural", table.plural?.[0]],
      ["2", "Singular", table.singular?.[1], "Plural", table.plural?.[1]],
      ["3", "Singular", table.singular?.[2], "Plural", table.plural?.[2]],
    ];

    // Person mapping by row: 1->1st,2->2nd,3->3rd
    const persons = ["1","2","3"];

    const rowHtml = persons.map((p, i) => {
      const sg = table.singular?.[i] || "";
      const pl = table.plural?.[i] || "";
      return `
        <tr>
          <td><span class="k">${PRONOUNS[`${p}-sg`]}</span></td>
          <td><button class="formBtn" data-verb="${verb.infinitive}" data-tense="${k}" data-person="${p}" data-number="sg">${escapeHtml(sg)}</button></td>
          <td><span class="k">${PRONOUNS[`${p}-pl`]}</span></td>
          <td><button class="formBtn" data-verb="${verb.infinitive}" data-tense="${k}" data-person="${p}" data-number="pl">${escapeHtml(pl)}</button></td>
        </tr>
      `;
    }).join("");

    return `
      <details class="tense tnum-${num}" data-tnum="${num}" open>
        <summary>
          <div>
            <div class="tenseTitle">${num} · ${escapeHtml(label)}</div>
            </div>
          
        </summary>
        <table>
          
          <colgroup>
            <col class="p1"><col class="f1"><col class="p2"><col class="f2">
          </colgroup>
          ${idx === 0 ? `<thead>
            <tr><th class="thgroup" colspan="2">SINGULAR</th><th class="thgroup" colspan="2">PLURAL</th></tr>
          </thead>` : ``}
          <tbody>
            ${rowHtml}
          </tbody>
        </table>
      </details>
    `;
  }).join("");
}

function escapeHtml(str) {
  return (str || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function renderImperative(v) {
  const imp = v.imperativeParsed || {};
  const hasStructured = imp.nosotros || imp.tu || imp.vosotros || imp.usted || imp.ustedes;

  if (!hasStructured) {
    return `<div class="mutedBlock">${escapeHtml((v.imperative || []).join("\n") || "—")}</div>`;
  }

  return `
    <div class="imperativeBoard">
      <div class="imperativeHalf imperativeHalf--left">
        <div class="imperativeLabel">yo</div>
        <div class="imperativeForm">--</div>
        <div class="imperativeLabel">tú</div>
        <div class="imperativeForm">${escapeHtml(imp.tu || "—")}</div>
        <div class="imperativeLabel">usted</div>
        <div class="imperativeForm">${escapeHtml(imp.usted || "—")}</div>
      </div>
      <div class="imperativeHalf imperativeHalf--right">
        <div class="imperativeLabel">nosotros</div>
        <div class="imperativeForm">${escapeHtml(imp.nosotros || "—")}</div>
        <div class="imperativeLabel">vosotros</div>
        <div class="imperativeForm">${escapeHtml(imp.vosotros || "—")}</div>
        <div class="imperativeLabel">ustedes</div>
        <div class="imperativeForm">${escapeHtml(imp.ustedes || "—")}</div>
      </div>
    </div>
  `;
}

function renderRelatedLines(lines) {
  const items = (lines || []).filter(Boolean);
  if (!items.length) {
    return `<div class="mutedBlock">—</div>`;
  }

  const parseSimpleEsEn = (text) => {
    const cleaned = cleanText(text);
    if (!cleaned) return null;

    const toMatch = cleaned.match(/^(.*?)\s+\bto\b\s+(.+)$/i);
    if (toMatch) {
      return { es: cleanText(toMatch[1]), en: `to ${cleanText(toMatch[2])}` };
    }

    const articleMatch = cleaned.match(/^((?:el|la|los|las|un|una|unos|unas)\s+\S+)\s+(.+)$/i);
    if (articleMatch) {
      return { es: cleanText(articleMatch[1]), en: cleanText(articleMatch[2]) };
    }

    const commaEsMatch = cleaned.match(/^([A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+(?:,\s*[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)+)\s+(.+)$/);
    if (commaEsMatch) {
      return { es: cleanText(commaEsMatch[1]), en: cleanText(commaEsMatch[2]) };
    }

    const twoTokenAdverbMatch = cleaned.match(/^(\S+)\s+([A-Za-z-]+ly)$/i);
    if (twoTokenAdverbMatch) {
      return { es: cleanText(twoTokenAdverbMatch[1]), en: cleanText(twoTokenAdverbMatch[2]) };
    }

    const fallback = cleaned.match(/^(\S+)\s+(.+)$/);
    if (fallback) {
      return { es: cleanText(fallback[1]), en: cleanText(fallback[2]) };
    }
    return null;
  };

  const parseRelatedLine = (line) => {
    const segments = [];
    const chunked = cleanText(line).split(/\s*;\s*/).map(cleanText).filter(Boolean);

    chunked.forEach(chunk => {
      const withTo = chunk.match(/^(.*?)([A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+(?:\s+[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+){0,3})\s+\bto\b\s+(.+)$/i);
      if (withTo) {
        const prefix = cleanText(withTo[1]);
        if (prefix) {
          const prefixPair = parseSimpleEsEn(prefix);
          if (prefixPair) {
            segments.push(prefixPair);
          } else {
            segments.push({ raw: prefix });
          }
        }

        const mainEn = cleanText(withTo[3]);
        const tailPair = mainEn.match(/^(.*)\s+([A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+(?:,\s*[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)+)\s+([A-Za-z][A-Za-z'-]+)$/);
        if (tailPair) {
          segments.push({ es: cleanText(withTo[2]), en: cleanText(tailPair[1]).startsWith("to ") ? cleanText(tailPair[1]) : `to ${cleanText(tailPair[1])}` });
          segments.push({ es: cleanText(tailPair[2]), en: cleanText(tailPair[3]) });
        } else {
          segments.push({ es: cleanText(withTo[2]), en: mainEn.startsWith("to ") ? mainEn : `to ${mainEn}` });
        }
        return;
      }

      const basicPair = parseSimpleEsEn(chunk);
      if (basicPair) {
        segments.push(basicPair);
      } else {
        segments.push({ raw: chunk });
      }
    });

    return segments;
  };

  return `
    <div class="notesList">
      ${items.map(line => {
        const parsed = parseRelatedLine(line);
        const rendered = parsed.map(part => {
          if (part.raw) {
            return escapeHtml(part.raw);
          }
          return `<span class="notesEsRelated">${escapeHtml(part.es)}</span> - ${escapeHtml(part.en)}`;
        }).join("; ");
        return `<div class="notesRow">${rendered}</div>`;
      }).join("")}
    </div>
  `;
}

function renderSynAntLines(syn, ant) {
  const parseSynAntItem = (item) => {
    const cleaned = cleanText(item);
    const toMatch = cleaned.match(/^(.*?)\s+\bto\b\s+(.+)$/i);
    if (toMatch) {
      return { es: cleanText(toMatch[1]), en: `to ${cleanText(toMatch[2])}` };
    }
    const fallback = cleaned.match(/^(\S+)\s+(.+)$/);
    if (fallback) {
      return { es: cleanText(fallback[1]), en: cleanText(fallback[2]) };
    }
    return { es: cleaned, en: "" };
  };

  const synItems = (syn || []).filter(Boolean).map(parseSynAntItem);
  const antItems = (ant || []).filter(Boolean).map(parseSynAntItem);

  if (!synItems.length && !antItems.length) {
    return `<div class="mutedBlock">—</div>`;
  }

  const renderItem = (item) => {
    if (!item.en) return `<span class="notesEsSyn">${escapeHtml(item.es)}</span>`;
    return `<span class="notesEsSyn">${escapeHtml(item.es)}</span> - ${escapeHtml(item.en)}`;
  };

  return `
    <div class="notesList">
      ${synItems.length ? `<div class="notesRow"><span class="notesTagSyn">Synonyms:</span> ${synItems.map(renderItem).join("; ")}.</div>` : ""}
      ${antItems.length ? `<div class="notesRow"><span class="notesTagAnt">Antonyms:</span> ${antItems.map(renderItem).join("; ")}.</div>` : ""}
    </div>
  `;
}

      <div class="chips">

      </div>
    </div>

    
    <div class="panel">
      <div class="twoCol">
        <section class="side" data-side="simple">
          <div class="colHeader">

</div>
          ${tenseBlocks(v.simple, v, "Simple")}
        </section>

        <section class="side" data-side="compound">
          <div class="colHeader">
            <div class="h">Compound tenses (8–14)</div>
</div>
          ${tenseBlocks(v.compound, v, "Compound")}
        </section>
      </div>

      <details class="tense tense--spaced imperativePanel tense--centerHead" open>
        <summary>
          <div class="summarySeam">
            <div class="summarySeamInner">

        </summary>
        <div class="pad">

      <details class="tense notesPanel tense--centerHead" open>
        <summary>
          <div class="summarySeam">

        <div class="pad">

  setTimeout(syncSidebarHeight, 120);

  // Conjugation click handlers
  detail.querySelectorAll(".formBtn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const b = e.currentTarget;
      showPopover(b, {

        person: b.dataset.person,
        number: b.dataset.number,
        form: b.textContent.trim()
      });
    });
  });
}










function computeGridWidths(detailRoot) {
  // Measure using a hidden DOM span so we get pixel-perfect widths for the actual font,
  // avoiding canvas font fallbacks and avoiding underestimation that can cause truncation.
  const meas = document.createElement("span");
  meas.style.position = "absolute";
  meas.style.left = "-99999px";
  meas.style.top = "-99999px";
  meas.style.whiteSpace = "nowrap";
  meas.style.visibility = "hidden";
  document.body.appendChild(meas);

  function measureWithStyle(sampleEl, text) {
    const cs = window.getComputedStyle(sampleEl);
    meas.style.fontFamily = cs.fontFamily;
    meas.style.fontSize = cs.fontSize;
    meas.style.fontWeight = cs.fontWeight;
    meas.style.fontStyle = cs.fontStyle;
    meas.style.fontVariant = cs.fontVariant;
    meas.textContent = text;
    return Math.ceil(meas.getBoundingClientRect().width);
  }

  // Samples for styling
  const formSample = detailRoot.querySelector(".formBtn");
  const pronSample = detailRoot.querySelector("tbody tr td:nth-child(1)");
  if (!formSample || !pronSample) {
    meas.remove();
    return;
  }

  // Pronoun widths (global across both sections)
  let maxP1 = 0, maxP2 = 0;
  detailRoot.querySelectorAll("tbody tr td:nth-child(1)").forEach(td => {
    const t = (td.textContent || "").trim();
    if (!t) return;
    maxP1 = Math.max(maxP1, measureWithStyle(pronSample, t));
  });
  detailRoot.querySelectorAll("tbody tr td:nth-child(3)").forEach(td => {
    const t = (td.textContent || "").trim();
    if (!t) return;
    maxP2 = Math.max(maxP2, measureWithStyle(pronSample, t));
  });

  // Form widths (independent per column & per section)
  function measureForms(sectionSel, colIdx) {
    let maxW = 0;
    detailRoot.querySelectorAll(sectionSel + ` tbody tr td:nth-child(${colIdx}) .formBtn`).forEach(btn => {
      const t = (btn.textContent || "").trim();
      if (!t) return;
      maxW = Math.max(maxW, measureWithStyle(formSample, t));
    });
    return maxW;
  }

  const sF1 = measureForms('section.side[data-side="simple"]', 2);
  const sF2 = measureForms('section.side[data-side="simple"]', 4);
  const cF1 = measureForms('section.side[data-side="compound"]', 2);
  const cF2 = measureForms('section.side[data-side="compound"]', 4);

  // Buffers include td padding + our extra padding-left for form columns + safety margin
  const pronBuf = 18;
  const formBuf = 30;

  detailRoot.style.setProperty("--p1W", (maxP1 + pronBuf) + "px");
  detailRoot.style.setProperty("--p2W", (maxP2 + pronBuf) + "px");

  detailRoot.style.setProperty("--sF1W", (sF1 + formBuf) + "px");
  detailRoot.style.setProperty("--sF2W", (sF2 + formBuf) + "px");
  detailRoot.style.setProperty("--cF1W", (cF1 + formBuf) + "px");
  detailRoot.style.setProperty("--cF2W", (cF2 + formBuf) + "px");

  const simpleSide = detailRoot.querySelector('section.side[data-side="simple"]');
  const compoundSide = detailRoot.querySelector('section.side[data-side="compound"]');
  if (simpleSide && compoundSide) {
    detailRoot.style.setProperty("--simpleSideW", Math.ceil(simpleSide.getBoundingClientRect().width) + "px");
    detailRoot.style.setProperty("--compoundSideW", Math.ceil(compoundSide.getBoundingClientRect().width) + "px");
  }

  meas.remove();
}





function runAutoWidths(detailEl) {
  // Run the same logic as "Reset to auto", but automatically.
  // Waiting for fonts + a paint avoids under-measurement on first load.
  const doIt = () => {
    requestAnimationFrame(() => {
      computeGridWidths(detailEl);
    });
  };

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(doIt).catch(doIt);
  } else {
    setTimeout(doIt, 0);
  }
}

function syncSidebarHeight() {
  const listCard = document.querySelector(".listCard");
  const mainCard = document.querySelector("main.card");
  const search = listCard?.querySelector(".search");
  const list = document.getElementById("list");
  if (!listCard || !mainCard || !search || !list) return;

  if (window.matchMedia("(max-width: 900px)").matches) {
    listCard.style.height = "";
    list.style.height = "";
    list.style.maxHeight = "";
    return;
  }

  const targetHeight = Math.ceil(mainCard.getBoundingClientRect().height);
  const listHeight = Math.max(120, targetHeight - Math.ceil(search.getBoundingClientRect().height));
  listCard.style.height = `${targetHeight}px`;
  list.style.height = `${listHeight}px`;
  list.style.maxHeight = `${listHeight}px`;
}

// Initialize once DOM is ready
const pop = document.getElementById("popover");
const popClose = document.getElementById("popClose");
popClose.addEventListener("click", hidePopover);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") hidePopover(); });
document.addEventListener("click", (e) => {
  // click outside
  if (pop.style.display === "none") return;
  if (pop.contains(e.target)) return;
  if (e.target.classList && e.target.classList.contains("formBtn")) return;
  hidePopover();
});

function showPopover(anchorEl, meta) {
  const rect = anchorEl.getBoundingClientRect();
  const pad = 10;

  const num = (meta.tense.match(/^\d+/) || [""])[0];
  const label = meta.tense.replace(/^\d+\s*/, "");
  const key = `${meta.person}-${meta.number}`;

  document.getElementById("popWord").textContent = meta.form;
  document.getElementById("popVerb").textContent = meta.verb;
  document.getElementById("popTense").textContent = `${num} · ${label}`;
  document.getElementById("popPerson").textContent = `${meta.person} (${
    meta.person === "1" ? "first" : meta.person === "2" ? "second" : "third"
  }) — ${PRONOUNS[key] || ""}`;
  document.getElementById("popNumber").textContent = meta.number === "sg" ? "singular" : "plural";
  document.getElementById("popHint").innerHTML = TENSE_HINTS[num] || "Tip: Add a short explanation here for this tense.";

  pop.style.display = "block";
  pop.setAttribute("aria-hidden","false");

  // Position near anchor (prefer below; flip if needed)
  const popRect = pop.getBoundingClientRect();
  let x = rect.left;
  let y = rect.bottom + 8;

  if (x + popRect.width > window.innerWidth - pad) x = window.innerWidth - popRect.width - pad;
  if (x < pad) x = pad;

  if (y + popRect.height > window.innerHeight - pad) {
    y = rect.top - popRect.height - 8;
  }
  if (y < pad) y = pad;

  pop.style.left = Math.round(x) + "px";
  pop.style.top = Math.round(y) + "px";
}

function hidePopover() {
  pop.style.display = "none";
  pop.setAttribute("aria-hidden","true");
}

document.getElementById("q").addEventListener("input", (e) => {
  renderList(e.target.value);
});

document.addEventListener("DOMContentLoaded", () => {
  // Build list and auto-select first verb (renderDetail will runAutoWidths)
  renderList("");
  syncSidebarHeight();

  // Extra safety: once everything (including fonts) is fully loaded, run again.
  window.addEventListener("load", () => {
    const detail = document.getElementById("detail");
    if (detail) runAutoWidths(detail);
    syncSidebarHeight();
  }, { once: true });
});

window.addEventListener("resize", () => {
  const detail = document.getElementById("detail");
  if (detail) runAutoWidths(detail);
  syncSidebarHeight();
});
